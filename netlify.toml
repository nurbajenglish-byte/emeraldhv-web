[build]
  publish = "public"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/checkout"
  to = "/.netlify/functions/checkout"
  status = 200

[[redirects]]
  from = "/api/pricing"
  to = "/.netlify/functions/pricing"
  status = 200

[[redirects]]
  from = "/tour"
  to = "/tour.html"
  status = 200

[[redirects]]
  from = "/competitions"
  to = "/competitions.html"
  status = 200

[[redirects]]
  from = "/competitions/success"
  to = "/success.html"
  status = 200

[[redirects]]
  from = "/competitions/cancel"
  to = "/competitions.html"
  status = 200

[[redirects]]
  from = "/emeraldprize"
  to = "/emeraldprize.html"
  status = 200

[[redirects]]
  from = "/aibfc"
  to = "/aibfc.html"
  status = 200

[[redirects]]
  from = "https://emeraldprize.com/*"
  to = "/emeraldprize.html"
  status = 200
  force = true

[[redirects]]
  from = "https://www.emeraldprize.com/*"
  to = "/emeraldprize.html"
  status = 200
  force = true

[[redirects]]
  from = "https://aibfc.org/*"
  to = "/aibfc.html"
  status = 200
  force = true

[[redirects]]
  from = "https://www.aibfc.org/*"
  to = "/aibfc.html"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
